# ============================================================
# Nginx 配置 · 高德地图 v4 安全代理
# 文件路径（示例）: /etc/nginx/sites-available/family-migration
#
# 作用：
#   浏览器 → Nginx /_AMapService/... → 高德服务器
#   Nginx 在转发时注入 jscode（安全密钥），密钥不出现在前端代码中
#
# 启用：
#   ln -s /etc/nginx/sites-available/family-migration \
#         /etc/nginx/sites-enabled/
#   nginx -t && nginx -s reload
# ============================================================

server {
    listen 80;
    server_name localhost;          # 生产环境替换为你的域名

    # ── 前端静态文件 ──────────────────────────────────────────
    location / {
        root   /path/to/family-migration-demo/frontend/public;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── 后端 API 转发 ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # SSE 支持（对话流式响应需要）
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── 高德地图 v4 安全代理 ──────────────────────────────────
    # 重要：将下面的 YOUR_JSCODE 替换为你的高德安全密钥
    # 安全密钥在：高德控制台 → 应用详情 → 安全密钥

    # 地图样式 API（v4 新增，用于加载地图瓦片样式）
    location /_AMapService/v4/map/styles {
        set $args "$args&jscode=YOUR_JSCODE";
        proxy_pass https://webapi.amap.com/v4/map/styles;

        # HTTPS 代理必要配置
        proxy_ssl_server_name on;
        proxy_set_header Host webapi.amap.com;
    }

    # Web 服务 API（地理编码等，前端若直接调用走此代理）
    # 注：后端 server.js 已直接调用，此处仅供前端直接调用场景使用
    location /_AMapService/ {
        set $args "$args&jscode=YOUR_JSCODE";
        proxy_pass https://restapi.amap.com/;

        proxy_ssl_server_name on;
        proxy_set_header Host restapi.amap.com;
    }

    # 地图瓦片代理（可选，若需要自定义地图样式）
    location /_AMapService/tile {
        proxy_pass https://webapi.amap.com/tile;
        proxy_ssl_server_name on;
        proxy_set_header Host webapi.amap.com;
    }
}


