# ============================================================
# Nginx 配置 · 家族迁徙地图应用
# ============================================================
# 启用方法：
#   1. 复制此文件到 /etc/nginx/sites-available/wangzu-map
#   2. 创建软链接：ln -s /etc/nginx/sites-available/wangzu-map /etc/nginx/sites-enabled/
#   3. 测试配置：nginx -t
#   4. 重载 Nginx：nginx -s reload
# ============================================================

server {
    listen 80;
    server_name localhost;          # 生产环境替换为你的域名

    # ── 前端静态文件（根目录） ─────────────────────────────────
    location / {
        root   /Users/jianyu/Documents/feisu/xungen/wangzu-map/frontend/public;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── 二级目录 /wangzu/ 部署 ────────────────────────────────
    # 访问 /wangzu/ 或 /wangzu/index.html 时显示 mobile-chat 页面
    location /wangzu/ {
        alias /Users/jianyu/Documents/feisu/xungen/wangzu-map/frontend/public/;
        index index.html;
        try_files $uri $uri/ /wangzu/index.html;
    }

    # ── 后端 API 转发 ─────────────────────────────────────────
    location /amapapi/ {
        proxy_pass         http://localhost:3005/amapapi/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 支持（对话流式响应需要）
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── 压缩优化 ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # ── 缓存静态资源 ─────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
