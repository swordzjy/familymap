<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translated">
<title>家族故事 - 完整版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --night:#090806;--ink0:#110f0b;--ink1:#1a1710;--ink2:#232018;
  --gold:#c8a96e;--gold2:#e8d098;--cream:#eee8d8;
  --mist:rgba(238,232,216,0.5);--mist2:rgba(238,232,216,0.25);
  --mist3:rgba(238,232,216,0.1);--mist4:rgba(238,232,216,0.05);
  --serif:'Noto Serif SC',serif;--mono:'DM Mono',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--night);overflow:hidden;
  color:var(--cream);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

/* 顶部导航 */
.nav-bar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(6px + env(safe-area-inset-top)) 16px 6px;
  background:rgba(9,8,6,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--mist4);
  display:flex;align-items:center;justify-content:space-between;
}
.nav-title{
  font-family:var(--serif);font-size:15px;font-weight:500;
  color:var(--cream);letter-spacing:0.05em;
}
.nav-actions{
  display:flex;gap:8px;
}
.nav-btn{
  font-size:11px;padding:4px 10px;
  border:1px solid var(--mist3);
  border-radius:6px;
  background:var(--ink1);
  color:var(--cream);
  cursor:pointer;
  font-family:var(--mono);
}
.nav-btn.primary{
  background:var(--gold);
  color:var(--ink0);
  border-color:var(--gold);
}
.nav-btn:active{opacity:0.7;}

/* 内容区 */
.content{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding-top:calc(52px + env(safe-area-inset-top));
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none;}

/* 故事容器 */
.story-container{
  padding:24px 20px;
  max-width:680px;
  margin:0 auto;
}

/* 故事标题 */
.story-title{
  font-family:var(--serif);
  font-size:24px;
  font-weight:600;
  color:var(--cream);
  text-align:center;
  margin-bottom:8px;
  letter-spacing:0.1em;
}
.story-meta{
  text-align:center;
  font-size:11px;
  color:var(--mist2);
  font-family:var(--mono);
  margin-bottom:24px;
}

/* 故事正文 */
.story-prose{
  font-family:var(--serif);
  font-size:15px;
  line-height:1.8;
  color:var(--cream);
  white-space:pre-wrap;
  word-wrap:break-word;
}
.story-prose p{
  margin-bottom:1.5em;
  text-indent:2em;
}

/* 章节标记 */
.chapter-marker{
  display:flex;
  align-items:center;
  gap:10px;
  margin:28px 0 16px;
  padding:10px 14px;
  background:linear-gradient(135deg, var(--ink1), var(--ink0));
  border:1px solid var(--mist4);
  border-radius:8px;
}
.chapter-num{
  font-family:var(--mono);
  font-size:10px;
  color:var(--gold);
  text-transform:uppercase;
}
.chapter-info{
  flex:1;
}
.chapter-title{
  font-family:var(--serif);
  font-size:13px;
  font-weight:500;
  color:var(--cream);
}
.chapter-meta{
  font-size:10px;
  color:var(--mist2);
  margin-top:2px;
}
.chapter-tags{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}
.tag{
  font-size:9px;
  padding:2px 6px;
  border-radius:4px;
  background:var(--mist3);
  color:var(--mist);
  font-family:var(--mono);
}
.tag.emotion{
  background:rgba(232,208,152,0.15);
  color:var(--gold2);
}

/* 合并章节标识 */
.merged-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:9px;
  padding:2px 6px;
  border-radius:4px;
  background:rgba(232,208,152,0.2);
  color:var(--gold2);
  font-family:var(--mono);
}
.merged-badge svg{
  width:10px;height:10px;
}

/* 加载状态 */
.loading-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(9,8,6,0.95);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.loading-spinner{
  width:36px;height:36px;
  border:2px solid var(--mist3);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{
  margin-top:16px;
  font-size:13px;
  color:var(--mist2);
  font-family:var(--mono);
}

/* 空状态 */
.empty-state{
  text-align:center;
  padding:60px 20px;
}
.empty-icon{
  width:64px;height:64px;
  margin:0 auto 20px;
  opacity:0.3;
}
.empty-title{
  font-family:var(--serif);
  font-size:18px;
  color:var(--cream);
  margin-bottom:8px;
}
.empty-desc{
  font-size:13px;
  color:var(--mist2);
  margin-bottom:24px;
}

/* 底部操作栏 */
.action-bar{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:rgba(9,8,6,0.95);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--mist4);
  display:flex;
  gap:10px;
  justify-content:center;
}
.action-bar a,
.action-bar button{
  flex:1;
  max-width:200px;
  padding:10px 16px;
  border-radius:8px;
  font-size:12px;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  font-family:var(--sans);
}
.action-bar .btn-secondary{
  background:var(--ink1);
  border:1px solid var(--mist3);
  color:var(--cream);
}
.action-bar .btn-primary{
  background:var(--gold);
  border:1px solid var(--gold);
  color:var(--ink0);
  font-weight:500;
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="nav-bar">
  <div class="nav-title" id="nav-title">家族故事</div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="goToTimeline()">时间线</button>
    <button class="nav-btn primary" onclick="regenerateStory()">重新生成</button>
  </div>
</div>

<!-- 内容区 -->
<div class="content">
  <!-- 空状态 -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="empty-title">暂无完整故事</div>
    <div class="empty-desc">点击下方按钮，AI 将基于所有章节数据创作一篇完整的家族故事</div>
    <button class="nav-btn primary" style="padding:12px 32px;font-size:14px;" onclick="generateStory()">开始生成完整故事</button>
  </div>

  <!-- 故事容器 -->
  <div id="story-container" class="story-container" style="display:none;">
    <h1 class="story-title" id="story-title">王府家族故事</h1>
    <div class="story-meta" id="story-meta">生成时间：刚刚 · 字数：4,200 · 章节：9</div>
    <div class="story-prose" id="story-prose"></div>
  </div>
</div>

<!-- 加载覆盖层 -->
<div id="loading-overlay" class="loading-overlay" style="display:none;">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">正在创作完整故事...</div>
</div>

<!-- 底部操作栏 -->
<div id="action-bar" class="action-bar" style="display:none;">
  <a href="story-timeline.html" class="btn btn-secondary">← 返回时间线</a>
  <a href="mobile.html" class="btn btn-primary">查看迁徙地图 →</a>
</div>

<script>
const API_BASE = '';
const familyId = new URLSearchParams(window.location.search).get('familyId') || localStorage.getItem('familyId');

// 页面加载
document.addEventListener('DOMContentLoaded', () => {
  if (!familyId) {
    alert('缺少 familyId 参数');
    return;
  }
  loadStory();
});

// 加载故事
async function loadStory() {
  showLoading(true);

  try {
    const res = await fetch(`${API_BASE}/amapapi/story-output/${familyId}?version=latest&type=full_story`);
    const data = await res.json();

    if (!data.exists) {
      showLoading(false);
      showEmptyState();
      return;
    }

    renderStory(data.output);
    document.getElementById('action-bar').style.display = 'flex';

  } catch (err) {
    console.error('[story-full] 加载失败:', err);
    alert('加载故事失败：' + err.message);
  } finally {
    showLoading(false);
  }
}

// 渲染故事
function renderStory(output) {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('story-container').style.display = 'block';

  // 标题
  document.getElementById('story-title').textContent = output.title || '家族故事';

  // 元数据
  const createdAt = new Date(output.created_at);
  const timeStr = createdAt.toLocaleDateString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  const chapterIndex = output.chapter_index || [];
  const mergedGroups = Array.isArray(output.merged_groups) ? output.merged_groups : [];

  document.getElementById('story-meta').innerHTML = `
    生成时间：${timeStr} · 字数：${output.word_count || 0} · 章节：${chapterIndex.length}
    ${mergedGroups.length > 0 ? `<span class="merged-badge" style="margin-left:8px;">👥 ${mergedGroups.length}组合并章节</span>` : ''}
  `;

  // 正文
  const proseEl = document.getElementById('story-prose');
  proseEl.innerHTML = '';

  const prose = output.prose || '';
  const paragraphs = prose.split('\n\n').filter(p => p.trim());

  // 按章节索引分割和渲染
  if (chapterIndex.length > 0) {
    // 有章节索引，按章节渲染
    let lastEnd = 0;
    chapterIndex.forEach((ch, idx) => {
      const start = ch.start_pos || lastEnd;
      const end = ch.end_pos || (idx === chapterIndex.length - 1 ? prose.length : chapterIndex[idx + 1]?.start_pos || prose.length);

      // 章节标记
      const markerHtml = createChapterMarker(ch, mergedGroups);
      proseEl.insertAdjacentHTML('beforeend', markerHtml);

      // 章节内容
      const chapterText = prose.slice(start, end).trim();
      if (chapterText) {
        const p = document.createElement('div');
        p.className = 'chapter-prose';
        p.style.cssText = 'margin-bottom:1.5em;text-indent:2em;';
        p.textContent = chapterText;
        proseEl.appendChild(p);
      }

      lastEnd = end;
    });
  } else {
    // 没有章节索引，简单分段
    paragraphs.forEach(para => {
      const p = document.createElement('div');
      p.style.cssText = 'margin-bottom:1.5em;text-indent:2em;';
      p.textContent = para;
      proseEl.appendChild(p);
    });
  }
}

// 创建章节标记
function createChapterMarker(chapter, mergedGroups) {
  const isMerged = mergedGroups.some(g => g.new_sequence === chapter.sequence);
  const emotionTags = chapter.emotion_tags || [];

  return `
    <div class="chapter-marker">
      <span class="chapter-num">CHAPTER ${chapter.sequence}</span>
      <div class="chapter-info">
        <div class="chapter-title">${chapter.title || '第' + chapter.sequence + '章'}</div>
        <div class="chapter-meta">
          ${chapter.year || '?'}年 · ${chapter.participants?.join('、') || '先辈'}
          ${chapter.from_place && chapter.to_place ? ` · ${chapter.from_place}→${chapter.to_place}` : ''}
        </div>
      </div>
      <div class="chapter-tags">
        ${isMerged ? '<span class="merged-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M13 7a4 4 0 11-8 0 4 4 0 018 0zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>合并</span>' : ''}
        ${emotionTags.slice(0, 2).map(tag => `<span class="tag emotion">${tag}</span>`).join('')}
        <span class="tag">${chapter.beat_type || 'narrative'}</span>
      </div>
    </div>
  `;
}

// 显示空状态
function showEmptyState() {
  document.getElementById('empty-state').style.display = 'block';
}

// 加载状态
function showLoading(show) {
  document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

// 生成完整故事
async function generateStory() {
  if (!confirm('确定要生成完整故事吗？这将调用 AI 基于所有章节数据创作一篇连贯的叙事文章，耗时约 30-60 秒。')) {
    return;
  }

  showLoading(true);
  document.getElementById('loading-text').textContent = '正在创作完整故事，请稍候...';

  try {
    const res = await fetch(`${API_BASE}/amapapi/generate-full-story/${familyId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });

    const data = await res.json();

    if (!data.success) {
      throw new Error(data.error || '生成失败');
    }

    console.log('[story-full] 生成完成:', data);

    // 重新加载
    setTimeout(() => {
      loadStory();
    }, 500);

  } catch (err) {
    console.error('[story-full] 生成失败:', err);
    alert('生成失败：' + err.message);
  } finally {
    showLoading(false);
  }
}

// 重新生成
async function regenerateStory() {
  if (!confirm('确定要重新生成完整故事吗？这将覆盖当前版本。')) {
    return;
  }
  generateStory();
}

// 返回时间线
function goToTimeline() {
  window.location.href = 'story-timeline.html?familyId=' + familyId;
}
</script>
</body>
</html>
