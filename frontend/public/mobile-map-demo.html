<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家族迁徙地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://webapi.amap.com/loader.js"></script>

<style>
:root{
  --night:#090806;--ink0:#110f0b;--ink1:#1a1710;
  --gold:#c8a96e;--gold2:#e8d098;--cream:#eee8d8;
  --mist:rgba(238,232,216,0.5);--mist2:rgba(238,232,216,0.25);
  --mist3:rgba(238,232,216,0.1);--mist4:rgba(238,232,216,0.05);
  --purple:#a890e0;--teal:#3ec9a0;--coral:#e07258;--blue:#6aabdc;
  --serif:'Noto Serif SC',serif;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--night);overflow:hidden;
  color:var(--cream);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

/* 顶部标题栏 */
.top-bar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  background:linear-gradient(to bottom,rgba(9,8,6,0.9) 60%,transparent);
  pointer-events:none;
}
.top-title{
  font-family:var(--serif);font-size:16px;font-weight:300;
  color:var(--cream);letter-spacing:0.05em;text-align:center;
}
.top-subtitle{
  font-family:var(--mono);font-size:11px;
  color:var(--mist2);text-align:center;margin-top:4px;
}

/* 底部信息栏 */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  padding:16px 16px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(9,8,6,0.95) 70%,transparent);
  pointer-events:auto;
}
.legend{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-bottom:12px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  background:rgba(9,8,6,0.6);backdrop-filter:blur(8px);
  border:1px solid var(--mist4);
  border-radius:16px;
  font-size:11px;color:var(--mist);
}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.action-btn{
  display:block;width:100%;
  padding:12px 20px;
  background:rgba(200,169,110,0.15);
  border:1px solid var(--gold);
  border-radius:10px;
  color:var(--gold);
  font-family:var(--sans);font-size:14px;font-weight:500;
  text-align:center;text-decoration:none;
  transition:all 0.2s;
}
.action-btn:active{background:rgba(200,169,110,0.25);}

/* 地图容器 */
#amap-container{width:100%;height:100%;}

/* 高德地图控件覆盖 */
.amap-logo{display:none !important;}
.amap-copyright{display:none !important;}

/* 迁徙事件卡片 */
.migration-event{
  position:absolute;top:calc(60px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-20px);
  z-index:30;
  background:rgba(9,8,6,0.92);backdrop-filter:blur(12px);
  border:1px solid rgba(200,169,110,0.3);
  border-radius:12px;
  padding:14px 20px;
  min-width:260px;max-width:calc(100% - 40px);
  text-align:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease,transform 0.6s ease;
}
.migration-event.visible{
  opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);
}
.event-year{
  font-family:var(--mono);font-size:22px;font-weight:500;
  color:var(--gold);margin-bottom:6px;letter-spacing:0.1em;
}
.event-title{
  font-family:var(--serif);font-size:14px;font-weight:400;
  color:var(--cream);margin-bottom:6px;letter-spacing:0.05em;
}
.event-desc{
  font-family:var(--serif);font-size:12px;font-weight:200;
  color:var(--mist);line-height:1.6;
}
.event-route{
  margin-top:6px;
  font-family:var(--mono);font-size:10px;
  color:var(--mist2);letter-spacing:0.05em;
}

/* 城市标记点样式 */
.city-label{
  font-family:var(--serif);font-size:13px;color:#fff;
  white-space:nowrap;
  background:rgba(9,8,6,0.85);
  padding:4px 10px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
}

/* 加载状态 */
.map-loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--night);z-index:200;
}
.map-loading-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);
  animation:ldot 1.4s ease-in-out infinite;
}
@keyframes ldot{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
.map-loading-txt{
  font-size:12px;color:var(--mist2);
  margin-top:12px;letter-spacing:0.08em;
}
</style>
</head>
<body>

<!-- 顶部标题 -->
<div class="top-bar">
  <div class="top-title" id="map-title">家族迁徙地图</div>
  <div class="top-subtitle" id="map-subtitle">加载中...</div>
</div>

<!-- 迁徙事件卡片 -->
<div class="migration-event" id="migration-event">
  <div class="event-year" id="event-year"></div>
  <div class="event-title" id="event-title"></div>
  <div class="event-desc" id="event-desc"></div>
  <div class="event-route" id="event-route"></div>
</div>

<!-- 底部操作栏 -->
<div class="bottom-bar">
  <a href="/mobile-chat.html" class="action-btn">返回聊天页面 →</a>
</div>

<!-- 地图容器 -->
<div id="amap-container"></div>

<!-- 加载状态 -->
<div class="map-loading" id="map-loading">
  <div class="map-loading-dot"></div>
  <div class="map-loading-txt">正在加载地图</div>
</div>

<script>
// ============================================================
// DEMO 数据
// ============================================================
const DEMO_PATHS = [
  {
    id: 'demo-1', sequence_order: 1,
    person_role: '父亲', person_name: '张志远', generation: 2,
    from_place: '黑龙江省双城县', from_lng: 126.312, from_lat: 45.374,
    to_place: '北京', to_lng: 116.407, to_lat: 39.904,
    year: 1960, reason: '求学', reason_type: 'study', emotion_weight: 'high',
    event_desc: '贫农的儿子考入清华大学，走出了家族的第一步',
  },
  {
    id: 'demo-2', sequence_order: 2,
    person_role: '父亲', person_name: '张志远', generation: 0,
    from_place: '北京', from_lng: 116.407, from_lat: 39.904,
    to_place: '辽宁省铁岭县', to_lng: 123.844, to_lat: 42.223,
    year: 1970, reason: '大学毕业分配到铁岭', reason_type: 'work', emotion_weight: 'medium',
    event_desc: '在铁岭工作生活至今',
  },
  {
    id: 'demo-3', sequence_order: 3,
    person_role: '母亲', person_name: '李秀英', generation: 2,
    from_place: '哈尔滨', from_lng: 126.642, from_lat: 45.757,
    to_place: '辽宁省铁岭县', to_lng: 123.844, to_lat: 42.223,
    year: 1970, reason: '随军调迁', reason_type: 'family', emotion_weight: 'medium',
    event_desc: '随丈夫工作调动，举家迁往铁岭',
  },
  {
    id: 'demo-4', sequence_order: 4,
    person_role: '本人', person_name: '你', generation: 0,
    from_place: '辽宁省铁岭县', from_lng: 123.844, from_lat: 42.223,
    to_place: '北京', to_lng: 116.407, to_lat: 39.904,
    year: 1990, reason: '大学毕业来京工作', reason_type: 'work', emotion_weight: 'medium',
    event_desc: '从铁岭来到北京，在这里工作生活至今',
  }
];

// 迁徙颜色
const MIGRATION_COLORS = {
  study:    '#a890e0',
  work:     '#6aabdc',
  family:   '#3ec9a0',
  assignment:'#e07258',
  war:      '#A32D2D',
  default:  '#c8a96e',
};

// 状态
const state = {
  amapInstance: null,
  markers: [],
  polylines: [],
  isAnimating: false,
};

// ============================================================
// 初始化地图
// ============================================================
function initMap() {
  AMapLoader.load({
    key: 'b05662825818663084ef068e06bf9744',
    version: '2.0',
    plugins: ['AMap.Polyline', 'AMap.Marker', 'AMap.Scale'],
    serviceHost: 'https://f.aifeisu.cn/_AMapService',
  })
  .then((AMap) => {
    window.AMap = AMap;

    state.amapInstance = new AMap.Map('amap-container', {
      zoom: 5,
      center: [113.0, 38.0],
      mapStyle: 'amap://styles/dark',
      doubleClickZoom: false,
      scrollWheel: true,
      touchZoom: true,
      rotateEnable: false,
      pitchEnable: false,
    });

    state.amapInstance.addControl(new AMap.Scale());
    document.getElementById('map-loading').style.display = 'none';

    renderDemoPaths(DEMO_PATHS);
  })
  .catch((e) => {
    console.error('[AMap] 加载失败:', e);
    document.getElementById('map-loading').innerHTML =
      '<div style="font-size:12px;color:var(--mist2);padding:20px;text-align:center;">地图加载失败<br>请检查网络连接</div>';
  });
}

// ============================================================
// 渲染 Demo 路径
// ============================================================
function renderDemoPaths(paths) {
  state.markers.forEach(m => m.remove());
  state.polylines.forEach(p => p.remove());
  state.markers = [];
  state.polylines = [];

  if (!paths?.length) return;

  const legendItems = {};
  const sorted = [...paths].filter(p => p.from_lng && p.to_lng)
    .sort((a, b) => (a.sequence_order || 0) - (b.sequence_order || 0));

  document.getElementById('map-title').textContent = '家族迁徙地图 · 示例';
  document.getElementById('map-subtitle').textContent =
    `4 段迁徙 · ${sorted.length - 1}个城市`;

  const polylines = [];
  const markerPairs = [];

  sorted.forEach((path, idx) => {
    const color = MIGRATION_COLORS[path.reason_type] || MIGRATION_COLORS.default;
    const from = [path.from_lng, path.from_lat];
    const to = [path.to_lng, path.to_lat];

    const midLng = (path.from_lng + path.to_lng) / 2;
    const midLat = (path.from_lat + path.to_lat) / 2 + 2.5 + (idx * 0.8);
    const allPts = generateCurve(from, to, [midLng, midLat], 80);

    const line = new AMap.Polyline({
      path: [allPts[0], allPts[0]],
      strokeColor: color,
      strokeWeight: path.emotion_weight === 'high' ? 4 : 3,
      strokeOpacity: 0,
      strokeStyle: 'solid',
      lineJoin: 'round',
      lineCap: 'round',
    });
    line._allPts = allPts;
    line.setMap(state.amapInstance);
    polylines.push(line);
    state.polylines.push(line);

    const fromWrap = createCityMarkerEl(path.from_place, color, false);
    const fromMk = new AMap.Marker({
      position: from,
      content: fromWrap,
      anchor: 'bottom-center',
    });
    const toWrap = createCityMarkerEl(path.to_place, color, idx === sorted.length - 1);
    const toMk = new AMap.Marker({
      position: to,
      content: toWrap,
      anchor: 'bottom-center',
    });
    fromMk.setMap(state.amapInstance);
    toMk.setMap(state.amapInstance);
    markerPairs.push({ fromWrap, toWrap, fromMk, toMk });
    state.markers.push(fromMk, toMk);
  });

  state.amapInstance.setFitView(state.markers, false, [60, 60, 100, 120]);

  setTimeout(() => startPathSequence(sorted, polylines, markerPairs), 1200);
}

// ============================================================
// 路径动画
// ============================================================
function startPathSequence(sorted, polylines, markerPairs) {
  if (state.isAnimating) return;
  state.isAnimating = true;

  let delay = 0;
  const DRAW_MS = 4000;
  const CARD_SHOW_MS = 3000;

  sorted.forEach((path, idx) => {
    setTimeout(() => showMarker(markerPairs[idx].fromWrap), delay);
    setTimeout(() => {
      if (isPathComplete(path)) showEvent(path);
    }, delay + 500);
    const lineDelay = delay + 500 + CARD_SHOW_MS;
    setTimeout(() => drawLineAnimate(polylines[idx], DRAW_MS), lineDelay);
    setTimeout(() => {
      hideEvent();
      showMarker(markerPairs[idx].toWrap);
    }, lineDelay + DRAW_MS);
    delay = lineDelay + DRAW_MS + 1500;
  });

  // 动画结束后重置循环
  setTimeout(() => {
    state.isAnimating = false;
    setTimeout(() => {
      if (!state.mapData) resetAnimation();
    }, 3000);
  }, delay);
}

function resetAnimation() {
  state.markers.forEach(m => {
    const content = m.getContent();
    if (content && content.style) {
      content.style.opacity = '0';
      content.style.transform = 'translateY(8px)';
    }
  });
  state.polylines.forEach(p => p.setOptions({ strokeOpacity: 0 }));
  hideEvent();

  const sorted = [...DEMO_PATHS].sort((a, b) =>
    (a.sequence_order || 0) - (b.sequence_order || 0)
  );

  const polylines = state.polylines;
  const markerPairs = [];
  state.markers.forEach((m, i) => {
    if (i % 2 === 0) markerPairs.push({ fromWrap: m.getContent() });
    else markerPairs[markerPairs.length - 1].toWrap = m.getContent();
  });

  setTimeout(() => startPathSequence(sorted, polylines, markerPairs), 1000);
}

function isPathComplete(path) {
  return path.year && (path.person_role || path.person_name) &&
         (path.reason || path.event_desc);
}

function showEvent(path) {
  const eventEl = document.getElementById('migration-event');
  if (!eventEl) return;

  document.getElementById('event-year').textContent = path.year;
  document.getElementById('event-title').textContent =
    `${path.person_role || ''}${path.person_name ? ' · ' + path.person_name : ''}`;
  document.getElementById('event-desc').textContent =
    path.event_desc || path.reason || '';
  document.getElementById('event-route').textContent =
    `${path.from_place} → ${path.to_place}`;

  eventEl.classList.add('visible');
  setTimeout(() => eventEl.classList.remove('visible'), 4000);
}

function hideEvent() {
  document.getElementById('migration-event')?.classList.remove('visible');
}

function showMarker(wrap) {
  if (!wrap) return;
  wrap.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
  wrap.style.opacity = '1';
  wrap.style.transform = 'translateY(0)';
}

function drawLineAnimate(line, duration) {
  if (!line) return;
  const allPts = line._allPts;
  if (!allPts) return;

  line.setOptions({ strokeOpacity: 0.9 });
  const steps = allPts.length;
  const interval = Math.max(duration / steps, 16);
  let drawn = 1;

  const timer = setInterval(() => {
    drawn = Math.min(drawn + 2, steps);
    line.setPath(allPts.slice(0, drawn));
    if (drawn >= steps) clearInterval(timer);
  }, interval * 2);
}

function generateCurve(from, to, mid, steps = 40) {
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const t1 = 1 - t;
    const x = t1 * t1 * from[0] + 2 * t1 * t * mid[0] + t * t * to[0];
    const y = t1 * t1 * from[1] + 2 * t1 * t * mid[1] + t * t * to[1];
    points.push([x, y]);
  }
  return points;
}

function createCityMarkerEl(label, color, isTerminal) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    opacity:0;transform:translateY(8px);
    display:flex;flex-direction:column;align-items:center;
    cursor:pointer;
  `;

  const dotSize = isTerminal ? '16px' : '11px';
  const glow = isTerminal ? `0 0 18px ${color}aa` : `0 0 10px ${color}66`;

  wrap.innerHTML = `
    <div style="
      width:${dotSize};height:${dotSize};border-radius:50%;
      background:${color};
      border:2px solid rgba(9,8,6,.85);
      box-shadow:${glow};
      ${isTerminal ? 'animation:termPulse 3.5s ease-in-out infinite;' : ''}
    "></div>
    <div style="
      margin-top:5px;font-family:'Noto Serif SC',serif;
      font-size:12px;color:${color};white-space:nowrap;
      background:rgba(9,8,6,.85);
      padding:4px 8px;border-radius:8px;
      border:1px solid ${color}55;
      letter-spacing:.03em;
      max-width:120px;
    ">${label || ''}</div>
  `;

  if (isTerminal && !document.getElementById('term-pulse-style')) {
    const st = document.createElement('style');
    st.id = 'term-pulse-style';
    st.textContent = `@keyframes termPulse{0%,100%{box-shadow:0 0 12px ${color}77;}50%{box-shadow:0 0 28px ${color}cc;}}`;
    document.head.appendChild(st);
  }

  return wrap;
}

// ============================================================
// 启动
// ============================================================
initMap();
</script>
</body>
</html>
