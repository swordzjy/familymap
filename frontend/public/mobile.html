<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家族迁徙地图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://webapi.amap.com/loader.js"></script>

<style>
:root{
  --night:#090806;--ink0:#110f0b;--ink1:#1a1710;
  --gold:#c8a96e;--gold2:#e8d098;--cream:#eee8d8;
  --mist:rgba(238,232,216,0.5);--mist2:rgba(238,232,216,0.25);
  --mist3:rgba(238,232,216,0.1);--mist4:rgba(238,232,216,0.05);
  --purple:#a890e0;--teal:#3ec9a0;--coral:#e07258;--blue:#6aabdc;
  --serif:'Noto Serif SC',serif;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--night);overflow:hidden;
  color:var(--cream);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

/* 顶部标题栏 */
.top-bar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  background:linear-gradient(to bottom,rgba(9,8,6,0.9) 60%,transparent);
  pointer-events:none;
}
.top-title{
  font-family:var(--serif);font-size:16px;font-weight:300;
  color:var(--cream);letter-spacing:0.05em;text-align:center;
}
.top-subtitle{
  font-family:var(--mono);font-size:11px;
  color:var(--mist2);text-align:center;margin-top:4px;
}

/* 底部信息栏 */
.bottom-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  padding:16px 16px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(9,8,6,0.95) 70%,transparent);
  pointer-events:auto;
}
.legend{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-bottom:12px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  background:rgba(9,8,6,0.6);backdrop-filter:blur(8px);
  border:1px solid var(--mist4);
  border-radius:16px;
  font-size:11px;color:var(--mist);
}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.action-btn{
  display:block;width:100%;
  padding:12px 20px;
  background:rgba(200,169,110,0.15);
  border:1px solid var(--gold);
  border-radius:10px;
  color:var(--gold);
  font-family:var(--sans);font-size:14px;font-weight:500;
  text-align:center;text-decoration:none;
  transition:all 0.2s;
}
.action-btn:active{background:rgba(200,169,110,0.25);}

/* 地图容器 */
#amap-container{width:100%;height:100%;}

/* 高德地图控件覆盖 */
.amap-logo{display:none !important;}
.amap-copyright{display:none !important;}

/* 迁徙事件卡片 */
.migration-event{
  position:absolute;top:calc(60px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-20px);
  z-index:30;
  background:rgba(9,8,6,0.92);backdrop-filter:blur(12px);
  border:1px solid rgba(200,169,110,0.3);
  border-radius:12px;
  padding:14px 20px;
  min-width:260px;max-width:calc(100% - 40px);
  text-align:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease,transform 0.6s ease;
}
.migration-event.visible{
  opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0);
}
.event-year{
  font-family:var(--mono);font-size:22px;font-weight:500;
  color:var(--gold);margin-bottom:6px;letter-spacing:0.1em;
}
.event-title{
  font-family:var(--serif);font-size:14px;font-weight:400;
  color:var(--cream);margin-bottom:6px;letter-spacing:0.05em;
}
.event-desc{
  font-family:var(--serif);font-size:12px;font-weight:200;
  color:var(--mist);line-height:1.6;
}
.event-route{
  margin-top:6px;
  font-family:var(--mono);font-size:10px;
  color:var(--mist2);letter-spacing:0.05em;
}

/* 城市标记点样式 */
.city-label{
  font-family:var(--serif);font-size:13px;color:#fff;
  white-space:nowrap;
  background:rgba(9,8,6,0.85);
  padding:4px 10px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
}

/* 加载状态 */
.map-loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--night);z-index:200;
}
.map-loading-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);
  animation:ldot 1.4s ease-in-out infinite;
}
@keyframes ldot{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
.map-loading-txt{
  font-size:12px;color:var(--mist2);
  margin-top:12px;letter-spacing:0.08em;
}
.map-loading-error{
  font-size:12px;color:var(--coral);
  margin-top:12px;text-align:center;padding:0 40px;
}
.map-loading-retry{
  margin-top:16px;
  padding:8px 20px;
  background:rgba(200,169,110,0.15);
  border:1px solid var(--gold);
  border-radius:8px;
  color:var(--gold);
  font-size:12px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- 顶部标题 -->
<div class="top-bar">
  <div class="top-title" id="map-title">家族迁徙地图</div>
  <div class="top-subtitle" id="map-subtitle">加载中...</div>
</div>

<!-- 迁徙事件卡片 -->
<div class="migration-event" id="migration-event">
  <div class="event-year" id="event-year"></div>
  <div class="event-title" id="event-title"></div>
  <div class="event-desc" id="event-desc"></div>
  <div class="event-route" id="event-route"></div>
</div>

<!-- 底部操作栏 -->
<div class="bottom-bar">
  <div class="legend" id="legend"></div>
  <a href="#" class="action-btn" id="back-link">返回故事时间线 →</a>
</div>

<!-- 地图容器 -->
<div id="amap-container"></div>

<!-- 加载状态 -->
<div class="map-loading" id="map-loading">
  <div class="map-loading-dot"></div>
  <div class="map-loading-txt">正在加载家族数据</div>
</div>

<script>
const API_BASE = '/amapapi';

// 迁徙颜色映射
const MIGRATION_COLORS = {
  study:    '#a890e0',  // 求学 - 紫色
  work:     '#6aabdc',  // 工作 - 蓝色
  family:   '#3ec9a0',  // 家庭 - 青色
  assignment:'#e07258', // 分配 - 珊瑚色
  war:      '#A32D2D',  // 战乱 - 红色
  disaster: '#e07258',  // 灾荒 - 橙色
  unknown:  '#c8a96e',  // 其他 - 金色
  default:  '#c8a96e',
};

// 迁徙原因中文映射
const REASON_LABELS = {
  study: '求学',
  work: '工作',
  family: '家庭',
  assignment: '分配',
  war: '战乱',
  disaster: '灾荒',
  unknown: '其他',
};

// 状态
const state = {
  amapInstance: null,
  markers: [],
  polylines: [],
  isAnimating: false,
  familyId: null,
  data: null,
};

// ============================================================
// 从 URL 获取 familyId
// ============================================================
function getFamilyIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('familyId');
}

// 从 sessionStorage 获取数据
function getDataFromSessionStorage() {
  try {
    const pendingData = sessionStorage.getItem('pending_map_data');
    if (pendingData) {
      return JSON.parse(pendingData);
    }
  } catch (e) {
    console.warn('读取 sessionStorage 失败:', e);
  }
  return null;
}

// ============================================================
// 初始化
// ============================================================
async function init() {
  const urlFamilyId = getFamilyIdFromURL();
  console.log('[mobile] URL familyId:', urlFamilyId);

  // 先尝试从 sessionStorage 获取数据
  const sessionData = getDataFromSessionStorage();
  if (sessionData && sessionData.familyId === urlFamilyId) {
    console.log('[mobile] 使用 sessionStorage 数据');
    state.data = sessionData;
    state.familyId = sessionData.familyId;
    await initMap();
    renderUserPaths(sessionData);
    return;
  }

  // 从 API 加载数据
  if (urlFamilyId) {
    state.familyId = urlFamilyId;
    await loadFromAPI(urlFamilyId);
  } else {
    showError('缺少 familyId 参数');
  }
}

// ============================================================
// 从 API 加载数据
// ============================================================
async function loadFromAPI(familyId) {
  const loadingEl = document.getElementById('map-loading');

  try {
    const response = await fetch(`${API_BASE}/migration-map/${familyId}`);
    const data = await response.json();

    if (!data.success && !data.paths) {
      throw new Error(data.error || '数据加载失败');
    }

    state.data = data;
    await initMap();
    renderUserPaths(data);

  } catch (e) {
    console.error('[mobile] 数据加载失败:', e);
    loadingEl.innerHTML = `
      <div class="map-loading-txt">数据加载失败</div>
      <div class="map-loading-error">${e.message}</div>
      <button class="map-loading-retry" onclick="location.reload()">重试</button>
    `;
  }
}

// ============================================================
// 初始化地图
// ============================================================
async function initMap() {
  return new Promise((resolve, reject) => {
    AMapLoader.load({
      key: 'b05662825818663084ef068e06bf9744',
      version: '2.0',
      plugins: ['AMap.Polyline', 'AMap.Marker', 'AMap.Scale'],
      serviceHost: 'https://f.aifeisu.cn/_AMapService',
    })
    .then((AMap) => {
      window.AMap = AMap;
      console.log('[mobile] AMap 加载成功');

      state.amapInstance = new AMap.Map('amap-container', {
        zoom: 5,
        center: [113.0, 38.0],
        mapStyle: 'amap://styles/dark',
        doubleClickZoom: false,
        scrollWheel: true,
        touchZoom: true,
        rotateEnable: false,
        pitchEnable: false,
      });

      state.amapInstance.addControl(new AMap.Scale());

      state.amapInstance.on('complete', () => {
        console.log('[mobile] 地图初始化完成');
        resolve();
      });
    })
    .catch((e) => {
      console.error('[mobile] AMap 加载失败:', e);
      reject(e);
    });
  });
}

// ============================================================
// 渲染用户路径
// ============================================================
function renderUserPaths(data) {
  console.log('[mobile] renderUserPaths 数据:', data);

  const loadingEl = document.getElementById('map-loading');
  const legendEl = document.getElementById('legend');

  // 隐藏加载状态
  loadingEl.style.display = 'none';

  // 处理数据 - 兼容两种格式
  const paths = data.paths || data.migrations || [];
  const persons = data.persons || [];

  console.log('[mobile] paths 第一项:', paths[0]);

  // 构建人物映射
  const personMap = {};
  persons.forEach(p => {
    personMap[p.internal_id || p.id] = p;
  });

  // 过滤有效路径（有经纬度）- 兼容多种字段名
  const validPaths = paths.filter(p => {
    // 尝试不同的字段名
    const fromLng = p.from_lng || p.fromLng || p.start_lng || p.startLng;
    const fromLat = p.from_lat || p.fromLat || p.start_lat || p.startLat;
    const toLng = p.to_lng || p.toLng || p.end_lng || p.endLng;
    const toLat = p.to_lat || p.toLat || p.end_lat || p.endLat;

    const hasCoords = fromLng && fromLat && toLng && toLat;
    if (!hasCoords) {
      console.log('[mobile] 路径缺少坐标:', p);
    }
    return hasCoords;
  });

  console.log('[mobile] validPaths 数量:', validPaths.length);

  if (validPaths.length === 0) {
    loadingEl.innerHTML = `
      <div class="map-loading-txt">暂无可显示的迁徙数据</div>
      <div class="map-loading-error">请确保聊天中包含地点信息</div>
      <a href="mobile-chat.html" class="map-loading-retry" style="display:inline-block;text-decoration:none;">返回聊天</a>
    `;
    return;
  }

  // 排序
  const sorted = [...validPaths].sort((a, b) =>
    (a.sequence_order || 0) - (b.sequence_order || 0)
  );

  // 统计城市数量
  const citySet = new Set();
  sorted.forEach(p => {
    citySet.add(p.from_place);
    citySet.add(p.to_place);
  });

  // 更新标题
  const familyName = data.familyName || data.family_name || '您的家族';
  document.getElementById('map-title').textContent = `${familyName} · 家族迁徙地图`;
  document.getElementById('map-subtitle').textContent =
    `${sorted.length} 段迁徙 · ${citySet.size} 座城市`;

  // 构建图例
  const reasonTypes = new Set(sorted.map(p => p.reason_type || 'unknown'));
  let legendHtml = '';
  reasonTypes.forEach(type => {
    const color = MIGRATION_COLORS[type] || MIGRATION_COLORS.default;
    const label = REASON_LABELS[type] || type;
    legendHtml += `
      <div class="legend-item">
        <div class="legend-dot" style="background:${color}"></div>
        <span>${label}</span>
      </div>
    `;
  });
  legendEl.innerHTML = legendHtml;

  // 清除旧标记
  state.polylines.forEach(p => p.remove());
  state.polylines = [];

  // 创建路径
  const polylines = [];

  sorted.forEach((path, idx) => {
    const person = personMap[path.person_internal_id] || personMap[path.person_id];
    const color = MIGRATION_COLORS[path.reason_type] || MIGRATION_COLORS.default;

    // 兼容不同的字段名，转换为数字
    const fromLng = parseFloat(path.from_lng || path.fromLng || path.start_lng);
    const fromLat = parseFloat(path.from_lat || path.fromLat || path.start_lat);
    const toLng = parseFloat(path.to_lng || path.toLng || path.end_lng);
    const toLat = parseFloat(path.to_lat || path.toLat || path.end_lat);
    const fromPlace = path.from_place || path.fromPlace || path.start_place;
    const toPlace = path.to_place || path.toPlace || path.end_place;

    const from = [fromLng, fromLat];
    const to = [toLng, toLat];

    const midLng = (fromLng + toLng) / 2;
    const midLat = (fromLat + toLat) / 2 + 2.5 + (idx * 0.8);
    const allPts = generateCurve(from, to, [midLng, midLat], 80);

    const line = new AMap.Polyline({
      path: [allPts[0], allPts[0]],
      strokeColor: color,
      strokeWeight: path.emotion_weight === 'high' ? 4 : 3,
      strokeOpacity: 0,
      strokeStyle: 'solid',
      lineJoin: 'round',
      lineCap: 'round',
    });
    line._allPts = allPts;
    line.setMap(state.amapInstance);
    polylines.push(line);
    state.polylines.push(line);
  });

  // 调整视野
  state.amapInstance.setFitView(polylines, false, [60, 60, 100, 120]);

  // 设置返回链接（带 familyId）
  const backLink = document.getElementById('back-link');
  if (backLink && state.familyId) {
    backLink.href = `/story-timeline.html?familyId=${state.familyId}`;
  }

  // 开始动画
  setTimeout(() => startPathSequence(sorted, polylines, personMap), 1200);
}

// ============================================================
// 生成贝塞尔曲线
// ============================================================
function generateCurve(from, to, mid, steps) {
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const t1 = 1 - t;
    const x = t1 * t1 * from[0] + 2 * t1 * t * mid[0] + t * t * to[0];
    const y = t1 * t1 * from[1] + 2 * t1 * t * mid[1] + t * t * to[1];
    points.push([x, y]);
  }
  return points;
}

// ============================================================
// 路径动画序列
// ============================================================
function startPathSequence(sorted, polylines, personMap) {
  if (state.isAnimating) return;
  state.isAnimating = true;

  let delay = 0;
  const DRAW_MS = 4000;
  const CARD_SHOW_MS = 3000;

  sorted.forEach((path, idx) => {
    const person = personMap[path.person_internal_id] || personMap[path.person_id];

    setTimeout(() => {
      showEvent(path, person);
    }, delay + 500);
    const lineDelay = delay + 500 + CARD_SHOW_MS;
    setTimeout(() => drawLineAnimate(polylines[idx], DRAW_MS), lineDelay);
    setTimeout(() => {
      hideEvent();
    }, lineDelay + DRAW_MS);
    delay = lineDelay + DRAW_MS + 1500;
  });

  // 动画结束后重置循环
  setTimeout(() => {
    state.isAnimating = false;
    setTimeout(() => {
      resetAnimation(sorted, polylines, personMap);
    }, 3000);
  }, delay);
}

// 重置动画
function resetAnimation(sorted, polylines, personMap) {
  state.polylines.forEach(p => p.setOptions({ strokeOpacity: 0 }));
  hideEvent();

  setTimeout(() => startPathSequence(sorted, polylines, personMap), 1000);
}

// ============================================================
// 显示迁徙事件卡片
// ============================================================
function showEvent(path, person) {
  const eventEl = document.getElementById('migration-event');
  if (!eventEl) return;

  const personName = person?.name && person.name !== '未知' ? person.name : '';
  const personRole = person?.role || '';
  const generation = person?.generation !== undefined ? `第${person.generation}代` : '';

  const reasonType = REASON_LABELS[path.reason_type] || path.reason_type || '';
  const reason = path.reason || path.event_desc || '';

  const fromPlace = path.from_place || path.fromPlace || path.start_place;
  const toPlace = path.to_place || path.toPlace || path.end_place;

  document.getElementById('event-year').textContent = `${path.year || '时间未知'} · ${reasonType}`;
  document.getElementById('event-title').textContent = `${personRole}${personName ? ' · ' + personName : ''} ${generation}`;
  document.getElementById('event-desc').textContent = reason;
  document.getElementById('event-route').textContent = `${fromPlace} → ${toPlace}`;

  eventEl.classList.add('visible');
  setTimeout(() => {
    eventEl.classList.remove('visible');
  }, 4000);
}

function hideEvent() {
  document.getElementById('migration-event')?.classList.remove('visible');
}

// ============================================================
// 路径动画
// ============================================================
function drawLineAnimate(line, duration) {
  if (!line) return;
  const allPts = line._allPts;
  if (!allPts) return;

  line.setOptions({ strokeOpacity: 0.9 });
  const steps = allPts.length;
  const interval = Math.max(duration / steps, 16);
  let drawn = 1;

  const timer = setInterval(() => {
    drawn = Math.min(drawn + 2, steps);
    line.setPath(allPts.slice(0, drawn));
    if (drawn >= steps) clearInterval(timer);
  }, interval * 2);
}

// ============================================================
// 显示错误
// ============================================================
function showError(message) {
  const loadingEl = document.getElementById('map-loading');
  loadingEl.innerHTML = `
    <div class="map-loading-txt">加载失败</div>
    <div class="map-loading-error">${message}</div>
    <a href="mobile-chat.html" class="map-loading-retry" style="display:inline-block;text-decoration:none;">返回聊天</a>
  `;
}

// ============================================================
// 启动
// ============================================================
init();
</script>
</body>
</html>
