<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家族故事</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --night:#090806;--ink0:#110f0b;--ink1:#1a1710;--ink2:#232018;
  --gold:#c8a96e;--gold2:#e8d098;--cream:#eee8d8;
  --mist:rgba(238,232,216,0.5);--mist2:rgba(238,232,216,0.25);
  --mist3:rgba(238,232,216,0.1);--mist4:rgba(238,232,216,0.05);
  /* 情绪标签颜色系统 */
  --emotion-hope:#e8d098;
  --emotion-pride:#e07258;
  --emotion-struggle:#888888;
  --emotion-loss:#6aabdc;
  --emotion-triumph:#3ec9a0;
  --emotion-nostalgia:#a890e0;
  --emotion-belonging:#3ec9a0;
  --emotion-change:#d4a056;
  --serif:'Noto Serif SC',serif;--mono:'DM Mono',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--night);overflow:hidden;
  color:var(--cream);font-family:var(--sans);-webkit-font-smoothing:antialiased;}

/* 顶部导航 */
.nav-bar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(6px + env(safe-area-inset-top)) 16px 6px;
  background:rgba(9,8,6,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--mist4);
  display:flex;align-items:center;justify-content:space-between;
}
.nav-title{
  font-family:var(--serif);font-size:15px;font-weight:500;
  color:var(--cream);letter-spacing:0.05em;
}
.nav-status{
  font-size:10px;color:var(--mist2);
  font-family:var(--mono);
  display:flex;align-items:center;gap:6px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--mist3);
  transition:all 0.3s;
}
.status-dot.streaming{background:var(--teal);animation:pulse 1.5s ease-in-out infinite;}
.status-dot.done{background:var(--gold);}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

/* 内容区 */
.content{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding-top:calc(52px + env(safe-area-inset-top));
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none;}

/* 故事容器 */
.story-container{
  margin:16px 12px;
  display:flex;flex-direction:column;gap:16px;
}

/* 章节卡片 */
.chapter-card{
  background:linear-gradient(135deg, var(--ink1) 0%, var(--ink0) 100%);
  border:1px solid var(--mist4);
  border-radius:10px;
  padding:14px;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  transition:all 0.5s ease;
}
.chapter-card.visible{
  opacity:1;
  transform:translateY(0);
}
.chapter-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--mist3), var(--gold), var(--mist3));
}
.chapter-card.danger::before{background:linear-gradient(90deg, var(--mist3), var(--coral), var(--mist3));}
.chapter-card.choice::before{background:linear-gradient(90deg, var(--mist3), var(--teal), var(--mist3));}
.chapter-card.arrival::before{background:linear-gradient(90deg, var(--mist3), var(--emotion-triumph), var(--mist3));}
.chapter-card.anchor::before{background:linear-gradient(90deg, var(--mist3), var(--emotion-nostalgia), var(--mist3));}
.chapter-card.opening::before{background:linear-gradient(90deg, var(--mist3), var(--emotion-hope), var(--mist3));}

.chapter-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.chapter-title{
  font-family:var(--serif);font-size:14px;font-weight:500;
  color:var(--cream);
}
.chapter-beat{
  font-size:9px;color:var(--mist2);font-family:var(--mono);
  text-transform:capitalize;
  padding:2px 6px;border-radius:4px;
  background:rgba(200,169,110,0.1);
  color:var(--gold);
}

.chapter-narration{
  font-size:13px;line-height:1.8;
  color:var(--mist);
  font-family:var(--serif);
  min-height:1.8em;
}
.chapter-narration .cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--gold);
  margin-left:2px;
  animation:blink 1s ease-in-out infinite;
  vertical-align:text-bottom;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

.chapter-context{
  font-size:11px;color:var(--mist2);font-family:var(--mono);
  padding:8px 10px;background:var(--ink0);
  border-radius:6px;margin-top:10px;
  border-left:2px solid var(--mist4);
  opacity:0;
  transform:translateX(-10px);
  transition:all 0.4s ease 0.3s;
}
.chapter-context.visible{opacity:1;transform:translateX(0);}
.chapter-context-label{color:var(--gold);margin-right:6px;font-weight:600;}

/* 情绪标签 */
.emotion-tags{
  display:flex;gap:4px;flex-wrap:wrap;
  margin-top:10px;
  opacity:0;
  transform:translateY(10px);
  transition:all 0.4s ease 0.5s;
}
.emotion-tags.visible{opacity:1;transform:translateY(0);}
.emotion-tag{
  font-size:9px;padding:3px 6px;border-radius:4px;
  font-family:var(--mono);
  font-weight:600;
  border:1px solid rgba(255,255,255,0.2);
}
.emotion-tag.hope{ background:rgba(232,208,152,0.15); color:var(--emotion-hope); border-color:var(--emotion-hope); }
.emotion-tag.pride{ background:rgba(224,114,88,0.15); color:var(--emotion-pride); border-color:var(--emotion-pride); }
.emotion-tag.struggle{ background:rgba(136,136,136,0.15); color:var(--emotion-struggle); border-color:var(--emotion-struggle); }
.emotion-tag.loss{ background:rgba(106,171,220,0.15); color:var(--emotion-loss); border-color:var(--emotion-loss); }
.emotion-tag.triumph{ background:rgba(62,201,160,0.15); color:var(--emotion-triumph); border-color:var(--emotion-triumph); }
.emotion-tag.nostalgia{ background:rgba(168,144,224,0.15); color:var(--emotion-nostalgia); border-color:var(--emotion-nostalgia); }
.emotion-tag.belonging{ background:rgba(62,201,160,0.15); color:var(--emotion-belonging); border-color:var(--emotion-belonging); }
.emotion-tag.change{ background:rgba(212,160,86,0.15); color:var(--emotion-change); border-color:var(--emotion-change); }

/* 家族数据概览 */
.family-summary-card{
  position:fixed;top:calc(60px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:linear-gradient(135deg, var(--ink1) 0%, var(--ink0) 100%);
  border:1px solid var(--mist4);
  border-radius:12px;
  padding:14px 16px;
  display:grid;gap:10px;
  width:calc(100% - 24px);
  max-width:360px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  opacity:0;transform:translateX(-50%) translateY(-20px);
  transition:all 0.5s ease;
}
.family-summary-card.visible{
  opacity:1;transform:translateX(-50%) translateY(0);
}
.summary-item{
  display:flex;flex-direction:column;align-items:center;
  min-width:0;
}
.summary-item.wide{
  grid-column:span 2;
}
.summary-item.row{
  display:flex;flex-direction:row;gap:12px;
}
.summary-value{
  font-size:24px;font-weight:700;
  font-family:var(--serif);
  color:var(--gold);
  line-height:1;
}
.summary-value.large{
  font-size:34px;
}
.summary-label{
  font-size:10px;color:var(--mist2);
  font-family:var(--mono);
  margin-top:4px;
  text-align:center;
  white-space:nowrap;
}
.summary-divider{
  width:100%;height:1px;
  background:var(--mist4);
  margin:6px 0;
}

/* 加载状态 */
.loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(9,8,6,0.95);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;
}
.loading-text{
  font-family:var(--serif);font-size:16px;
  color:var(--cream);margin-top:20px;
  font-weight:400;
}
.loading-progress{
  font-size:12px;color:var(--mist2);
  font-family:var(--mono);margin-top:10px;
}
/* 实时计时器 */
.live-timer{
  font-size:32px;
  font-family:var(--mono);
  color:var(--gold);
  font-weight:700;
  margin-top:15px;
  letter-spacing:2px;
}
/* 进度时间线 */
.progress-timeline{
  margin-top:20px;
  padding:12px 20px;
  max-width:400px;
  max-height:200px;
  overflow-y:auto;
  background:var(--ink0);
  border:1px solid var(--mist4);
  border-radius:8px;
  font-size:11px;
  font-family:var(--mono);
  color:var(--mist2);
}
.progress-timeline::-webkit-scrollbar{width:4px;}
.progress-timeline::-webkit-scrollbar-thumb{background:var(--mist4);border-radius:2px;}
.timeline-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;
  border-bottom:1px solid var(--mist3);
}
.timeline-item:last-child{border-bottom:none;}
.timeline-time{
  color:var(--gold);
  min-width:50px;
  font-weight:600;
}
.timeline-message{
  color:var(--mist);
  flex:1;
}
.timeline-item.done .timeline-time{color:var(--teal);}
.timeline-item.chapter .timeline-time{color:var(--purple);}

/* 底部操作栏 */
.action-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 12px calc(6px + env(safe-area-inset-bottom));
  background:rgba(9,8,6,0.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--mist4);
  display:flex;gap:10px;
}
.btn{
  flex:1;
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  text-align:center;
  cursor:pointer;
  border:none;
  text-decoration:none;
}
.btn-primary{
  background:var(--gold);
  color:var(--night);
}
.btn-primary:active{opacity:0.8;}
.btn-secondary{
  background:transparent;
  border:1px solid var(--mist4);
  color:var(--mist);
}
.btn-secondary:active{background:var(--mist3);}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="nav-bar">
  <div class="nav-title" id="nav-title">家族故事</div>
  <div class="nav-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">准备中</span>
  </div>
</div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loading-overlay">
  <!-- 家族数据概览 -->
  <div class="family-summary-card" id="family-summary-card" style="display:none;">
    <!-- 第一行：家族名 + 年代周期（垂直排列） -->
    <div class="summary-item wide">
      <span class="summary-value large" id="summary-family-name">-</span>
   
      <div class="summary-divider"></div>
      <div style="display:flex;justify-content:center;gap:16px;margin-top:6px;">
        <div class="summary-item">
          <span class="summary-value" id="summary-years">-</span>
        
        </div>
      </div>
    </div>
    <!-- 第二行：家庭成员 + 迁徙次数 + 涉及城市 -->
    <div class="summary-item row" style="justify-content:space-around;">
      <div class="summary-item">
        <span class="summary-value" id="summary-persons">0</span>
        <span class="summary-label">家庭成员</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="summary-migrations">0</span>
        <span class="summary-label">迁徙次数</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="summary-cities">0</span>
        <span class="summary-label">城市数</span>
      </div>
    </div>
  </div>

  <div class="loading-dot"></div>
  <div class="loading-text">正在生成您的家族故事</div>
  <div class="loading-progress" id="loading-progress">连接 AI 中...</div>
  <!-- 实时时钟 -->
  <div class="live-timer" id="live-timer">0.0s</div>
  <!-- 进度时间线 -->
  <div class="progress-timeline" id="progress-timeline"></div>
</div>

<!-- 内容区 -->
<div class="content">
  <div class="story-container" id="story-container"></div>
</div>

<!-- 底部操作栏（仅在加载已有故事时显示） -->
<div class="action-bar" id="action-bar" style="display:none;">
  <a href="story-timeline.html" class="btn btn-secondary">← 返回时间线</a>
  <button class="btn btn-secondary" onclick="regenerateStory()">重新生成</button>
  <a href="mobile.html" class="btn btn-primary">查看迁徙地图 →</a>
</div>

<script>
const API_BASE = '/amapapi';

// 从 URL 获取 familyId
function getFamilyId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('familyId');
}

const familyId = getFamilyId();
console.log('[story] familyId:', familyId);

if (!familyId) {
  alert('缺少 familyId 参数，请从故事时间线页面进入');
  window.location.href = 'story-timeline.html';
}

// DOM 元素
const storyContainer = document.getElementById('story-container');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingProgress = document.getElementById('loading-progress');
const liveTimer = document.getElementById('live-timer');
const progressBar = document.getElementById('progress-timeline');
const statusBar = document.getElementById('status-text');
const statusDot = document.getElementById('status-dot');
const actionBar = document.getElementById('action-bar');
const navTitle = document.getElementById('nav-title');
const familySummaryCard = document.getElementById('family-summary-card');
const summaryFamilyName = document.getElementById('summary-family-name');
const summaryPersons = document.getElementById('summary-persons');
const summaryMigrations = document.getElementById('summary-migrations');
const summaryYears = document.getElementById('summary-years');
const summaryCities = document.getElementById('summary-cities');

// 全局计时
let startTime = Date.now();
let timerInterval = null;

// 更新实时计时器
function updateLiveTimer() {
  if (!liveTimer) return;
  const elapsedSec = Math.floor((Date.now() - startTime) / 1000);
  liveTimer.textContent = elapsedSec + 's';
}

// 启动计时器
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateLiveTimer, 1000);  // 每秒更新一次
}

// 停止计时器
function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// 添加进度时间线索引（显示真实时间）
function addTimelineItem(message, startTime, endTime = null, type = null) {
  if (!progressBar) return;

  // 如果 startTime 是字符串（如 "0 秒"），说明是旧调用方式，直接用字符串显示
  if (typeof startTime === 'string') {
    const item = document.createElement('div');
    item.className = 'timeline-item done';
    item.innerHTML = `
      <span class="timeline-time">${startTime}</span>
      <span class="timeline-message">${message}</span>
    `;
    progressBar.appendChild(item);
    progressBar.scrollTop = progressBar.scrollHeight;
    return;
  }

  const duration = ((endTime || Date.now()) - startTime) / 1000;
  const item = document.createElement('div');
  let className = `timeline-item ${endTime ? 'done' : ''}`;
  if (type === 'chapter') className = 'timeline-item chapter';

  const startTimeStr = new Date(startTime).toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  item.innerHTML = `
    <span class="timeline-time">${startTimeStr} (${duration.toFixed(1)}s)</span>
    <span class="timeline-message">${message}</span>
  `;
  progressBar.appendChild(item);
  // 滚动到底部
  progressBar.scrollTop = progressBar.scrollHeight;
  return startTime; // 返回开始时间供下一步使用
}

// 加载家族数据概览
async function loadFamilySummary() {
  try {
    const res = await fetch(`${API_BASE}/migration-map/${familyId}`);
    const data = await res.json();
    if (data.success) {
      // 家族姓氏（兼容两种命名）
      const familyName = data.family_name || data.familyName;
      if (familyName) {
        summaryFamilyName.textContent = familyName;
      }
      // 家庭成员数
      if (data.persons && data.persons.length > 0) {
        summaryPersons.textContent = data.persons.length;
      }
      // 迁徙次数
      if (data.paths && data.paths.length > 0) {
        summaryMigrations.textContent = data.paths.length;
        // 时间跨度
        const years = data.paths.map(p => p.year).filter(y => y);
        if (years.length > 0) {
          const minYear = Math.min(...years);
          const maxYear = Math.max(...years);
          summaryYears.textContent = minYear === maxYear ? minYear : `${minYear}-${maxYear}`;
        }
        // 涉及城市数（去重）
        const cities = new Set();
        data.paths.forEach(p => {
          if (p.from_place) cities.add(p.from_place);
          if (p.to_place) cities.add(p.to_place);
        });
        summaryCities.textContent = cities.size;
      }
      // 显示卡片
      familySummaryCard.style.display = 'flex';
      setTimeout(() => familySummaryCard.classList.add('visible'), 10);
    }
  } catch (e) {
    console.warn('[story] 加载家族数据失败:', e);
  }
}

// 设置页面标题
async function loadFamilyName() {
  try {
    const res = await fetch(`${API_BASE}/migration-map/${familyId}`);
    const data = await res.json();
    if (data.success) {
      const familyName = data.family_name || data.familyName;
      if (familyName) {
        navTitle.textContent = `${familyName}家族故事`;
      }
    }
  } catch (e) {
    console.warn('[story] 加载家族名称失败:', e);
  }
}

// 流式生成故事
async function streamGenerateStory() {
  startTime = Date.now();
  startTimer();  // 启动计时器
  updateStatus('正在分析叙事结构...', 'streaming');
  loadingProgress.textContent = '分析叙事结构...';
  addTimelineItem('开始分析叙事结构', '0 秒');

  try {
    // 直接调用流式生成接口，后端会自动分析叙事并生成故事
    console.log('[story] 连接 SSE (POST):', `${API_BASE}/generate-story-stream/${familyId}`);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API_BASE}/generate-story-stream/${familyId}`, true);
    xhr.setRequestHeader('Content-Type', 'application/json');

    // 不传递 blueprint，后端自己生成
    xhr.send(JSON.stringify({}));

    let lastChapterStart = null;

    xhr.onprogress = () => {
      const text = xhr.responseText;
      // 解析 SSE 格式：data: {...}\n\n
      const lines = text.split('\n\n');
      const lastCompleteLine = lines[lines.length - 2]; // 最后一个完整的 data 行

      if (lastCompleteLine && lastCompleteLine.startsWith('data: ')) {
        try {
          const data = JSON.parse(lastCompleteLine.slice(6));
          handleSSEMessage(data);
        } catch (e) {
          console.warn('[story] 解析 SSE 消息失败:', e);
        }
      }
    };

    xhr.onload = () => {
      console.log('[story] SSE 连接关闭');
      if (xhr.status !== 200) {
        throw new Error(`SSE 错误：${xhr.status}`);
      }
    };

    xhr.onerror = (err) => {
      console.error('[story] SSE 错误:', err);
      throw new Error('故事生成连接中断');
    };

    // 处理 SSE 消息
    function handleSSEMessage(data) {
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      console.log('[story] SSE 消息:', data.type, data);

      if (data.type === 'blueprint_done') {
        console.log('[story] 蓝图分析完成');
        const duration = data.duration || elapsed;
        addTimelineItem(`蓝图分析完成`, `${duration}秒`, 'done');
        updateStatus('正在创作故事...', 'streaming');
        loadingProgress.textContent = `AI 正在创作故事... (已耗时 ${elapsed}秒)`;

      } else if (data.type === 'progress') {
        // 总体进度更新
        console.log('[story] 进度更新:', data.message);
        loadingProgress.textContent = `${data.message} (已耗时 ${elapsed}秒)`;

      } else if (data.type === 'chapter_start') {
        console.log('[story] 开始第', data.chapterIndex, '章');
        lastChapterStart = Date.now();
        // 新章节开始（只创建空卡片）
        createChapterCard(data.chapter);
        // 添加时间线索引（用字符串描述类型）
        addTimelineItem(`开始第 ${data.chapterIndex} 章：${data.chapter?.beat_type || ''}`, lastChapterStart, null, 'chapter');

      } else if (data.type === 'chapter_complete') {
        console.log('[story] 第', data.chapterIndex, '章完成，narration 长度:', data.chapter?.narration?.length);
        const chapterDuration = data.duration || 0;
        addTimelineItem(`第 ${data.chapterIndex} 章完成 (${data.chapter?.narration?.length || 0}字)`, lastChapterStart, Date.now());
        // 章节完成，接收完整文本并做打字机效果
        appendTextToChapter(data.chapterIndex, data.chapter?.narration || '');
        // 延迟显示历史背景和情绪标签
        setTimeout(() => {
          completeChapter(data.chapterIndex, data.chapter);
        }, 1000);

      } else if (data.type === 'done') {
        // 全部完成 - 跳转到 story-timeline.html 查看故事
        const totalDuration = data.duration || Math.round((Date.now() - startTime) / 1000);
        addTimelineItem(`🎉 故事生成完成！即将跳转...`, startTime, Date.now());
        console.log('[story] 故事生成完成，跳转到 story-timeline.html');

        // 1 秒后跳转到故事时间线页面
        setTimeout(() => {
          window.location.href = 'story-timeline.html';
        }, 1000);

      } else if (data.type === 'error') {
        throw new Error(data.error);
      }
    }

  } catch (err) {
    console.error('[story] 错误:', err);
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    loadingOverlay.innerHTML = `
      <div style="color:var(--coral);font-family:var(--serif);font-size:16px;margin-bottom:10px;">故事生成失败</div>
      <div style="color:var(--mist2);font-size:12px;margin-bottom:10px;">${err.message}</div>
      <div style="color:var(--mist2);font-size:11px;font-family:var(--mono);margin-bottom:20px;">已耗时 ${elapsed}秒</div>
      <button class="btn btn-primary" onclick="location.reload()" style="padding:10px 24px;">重试</button>
    `;
  }
}

// 更新状态
function updateStatus(text, type) {
  statusBar.textContent = text;
  statusDot.className = 'status-dot ' + type;
}

// 创建章节卡片
function createChapterCard(chapter) {
  const card = document.createElement('div');
  card.className = `chapter-card ${chapter.beat_type}`;
  card.id = `chapter-${chapter.sequence_order}`;

  const emotionTags = chapter.emotion_tags || [];
  const tagsHtml = emotionTags.map(tag =>
    `<span class="emotion-tag ${tag}">${tag}</span>`
  ).join('');

  const contextText = chapter.historical_context
    ? (chapter.historical_context.event_name || chapter.historical_context.description || '历史背景')
    : null;

  card.innerHTML = `
    <div class="chapter-header">
      <span class="chapter-title">第${chapter.sequence_order}章</span>
      <span class="chapter-beat">${chapter.beat_type}</span>
    </div>
    <div class="chapter-narration" id="narration-${chapter.sequence_order}">
      <span class="cursor"></span>
    </div>
    ${contextText ? `
    <div class="chapter-context" id="context-${chapter.sequence_order}">
      <span class="chapter-context-label">历史背景</span>${contextText}
    </div>` : ''}
    <div class="emotion-tags" id="tags-${chapter.sequence_order}">${tagsHtml}</div>
  `;

  storyContainer.appendChild(card);

  // 触发动画
  requestAnimationFrame(() => {
    card.classList.add('visible');
  });

  // 滚动到新章节
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// 逐字添加文本
let textBuffer = {};
let typingTimers = {};

function appendTextToChapter(chapterIndex, text) {
  const narrationEl = document.getElementById(`narration-${chapterIndex}`);
  if (!narrationEl) return;

  console.log(`[appendTextToChapter] 第${chapterIndex}章，文本长度:`, text?.length);

  // 初始化缓冲区
  if (!textBuffer[chapterIndex]) {
    textBuffer[chapterIndex] = text || '';
  } else {
    textBuffer[chapterIndex] = (textBuffer[chapterIndex] || '') + (text || '');
  }

  // 逐字显示
  displayTextCharByChar(chapterIndex);
}

function displayTextCharByChar(chapterIndex) {
  const narrationEl = document.getElementById(`narration-${chapterIndex}`);
  if (!narrationEl) return;

  const fullText = textBuffer[chapterIndex] || '';
  const cursor = narrationEl.querySelector('.cursor');

  // 清除之前的定时器
  if (typingTimers[chapterIndex]) {
    clearTimeout(typingTimers[chapterIndex]);
  }

  console.log(`[displayTextCharByChar] 第${chapterIndex}章，目标长度:${fullText.length}`);

  // 获取已显示的字符数（通过计算文本节点）
  const textNodes = [];
  function collectTextNodes(node) {
    if (node.nodeType === 3 && node !== cursor) { // 文本节点
      textNodes.push(node);
    } else if (node.childNodes && node !== cursor) {
      for (let child of node.childNodes) {
        collectTextNodes(child);
      }
    }
  }
  collectTextNodes(narrationEl);

  const displayedText = textNodes.map(n => n.textContent).join('');
  console.log(`[displayTextCharByChar] 已显示:${displayedText.length} / 目标:${fullText.length}`);

  // 如果已经显示完了，就不再继续
  if (displayedText.length >= fullText.length) {
    console.log('[displayTextCharByChar] 已完成');
    if (cursor) cursor.remove();
    return;
  }

  function typeNextChar() {
    const currentLength = narrationEl.innerText.replace('\u200B', '').length;
    if (currentLength >= fullText.length) {
      // 完成
      if (cursor) cursor.remove();
      typingTimers[chapterIndex] = null;
      console.log('[displayTextCharByChar] 打字完成');
      return;
    }

    const charIndex = currentLength;
    if (charIndex < fullText.length) {
      // 插入字符到光标前
      const textNode = document.createTextNode(fullText[charIndex]);
      narrationEl.insertBefore(textNode, cursor);

      // 保持在视野内
      if (charIndex % 20 === 0) {
        narrationEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // 随机打字速度，模拟真实打字
      const delay = Math.random() * 30 + 20;
      typingTimers[chapterIndex] = setTimeout(typeNextChar, delay);
    } else {
      // 完成
      if (cursor) cursor.remove();
      typingTimers[chapterIndex] = null;
    }
  }

  typeNextChar();
}

// 完成章节
function completeChapter(chapterIndex, chapter) {
  const card = document.getElementById(`chapter-${chapterIndex}`);
  if (!card) return;

  // 显示历史背景和情绪标签
  const contextEl = document.getElementById(`context-${chapterIndex}`);
  const tagsEl = document.getElementById(`tags-${chapterIndex}`);

  if (contextEl) {
    contextEl.classList.add('visible');
  }
  if (tagsEl) {
    tagsEl.classList.add('visible');
  }
}

// 重新生成
function regenerateStory() {
  if (confirm('确定要重新生成故事吗？这将调用 AI 重新创作，耗时约 1-3 分钟。')) {
    // 清空加载遮罩，重新开始
    loadingOverlay.style.display = 'flex';
    actionBar.style.display = 'none';
    storyContainer.innerHTML = '';
    streamGenerateStory();
  }
}

// 初始化
async function init() {
  loadFamilySummary();
  loadFamilyName();

  // 先检查是否已有生成的故事
  const hasChapters = await checkExistingChapters();
  if (hasChapters) {
    // 已有数据，直接加载显示
    console.log('[story] 发现已生成的故事，直接加载');
    await loadExistingChapters();
  } else {
    // 没有数据，调用 AI 生成
    console.log('[story] 未发现已生成的故事，开始 AI 生成');
    streamGenerateStory();
  }
}

// 检查是否已有章节数据
async function checkExistingChapters() {
  try {
    const res = await fetch(`${API_BASE}/story-chapters/${familyId}`);
    const data = await res.json();
    return data.success && data.chapters && data.chapters.length > 0;
  } catch (e) {
    console.warn('[story] 检查章节失败:', e);
    return false;
  }
}

// 加载已有章节
async function loadExistingChapters() {
  try {
    const res = await fetch(`${API_BASE}/story-chapters/${familyId}`);
    const data = await res.json();
    if (!data.success) throw new Error('加载失败');

    // 隐藏加载遮罩
    loadingOverlay.style.display = 'none';
    actionBar.style.display = 'flex';

    // 逐章显示
    for (const chapter of data.chapters) {
      createChapterCard(chapter);
      const chapterIndex = chapter.sequence_order;

      // 显示文本（打字机效果）
      await new Promise(resolve => setTimeout(resolve, 300));
      appendTextToChapter(chapterIndex, chapter.narration || '');

      // 显示上下文和标签
      setTimeout(() => {
        completeChapter(chapterIndex, chapter);
      }, 500);
    }

    updateStatus('已加载', 'done');
    console.log('[story] 已加载', data.chapters.length, '章');
  } catch (e) {
    console.error('[story] 加载章节失败:', e);
    // 加载失败，重新生成
    streamGenerateStory();
  }
}

init();
</script>
