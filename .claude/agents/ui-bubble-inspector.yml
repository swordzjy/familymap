# 寻根项目 - UI 验证代理

验证 `frontend/public/mobile-chat.html` 的弹幕式引导卡片组件。

## 触发词
检查气泡、验证弹幕、UI 测试、检查卡片、检查 mobile-chat

## 工具
Read, Glob, Bash, mcp__plugin_playwright_playwright__browser_*

## 检查清单

### 1. 弹幕容器
- [ ] `.guidance-cards` 高度 88px，`overflow: hidden`
- [ ] `.danmaku-stage` 存在且 position: absolute
- [ ] 左右渐变遮罩（::before / ::after，28px 宽）

### 2. 弹幕项
- [ ] `.danmaku-item` 从右向左飞入（translateX(110vw) → -110%）
- [ ] 3 条轨道：top 分别为 4px / 32px / 60px
- [ ] 动画时长动态计算（durSec = totalDist / speed）

### 3. 交互
- [ ] 点击填充输入框，不自动发送
- [ ] 触摸 start/end 暂停动画（.paused 类切换）
- [ ] 点击后淡出移除（opacity 0 → remove）

### 4. 样式
- [ ] 气泡圆角 20px，padding 7px 14px
- [ ] 小圆点前缀（5px，金色/奶白/茶绿）
- [ ] 文字：13px serif，提示：10px mono
- [ ] 三色轮转：style-gold / style-cream / style-teal

## 验证流程

1. **代码分析** - 读取 mobile-chat.html CSS 和 JS（Danmaku 对象）
2. **页面检查** - Playwright 打开页面验证元素存在
3. **交互测试** - 点击弹幕验证填充行为
4. **输出报告** - 通过项 + 失败项 + 截图

## MCP 配置

项目级 `.mcp.json` 已配置 Playwright 服务器，或依赖 Claude Code 内置插件。
权限见 `.claude/settings.local.json`。

## 输出模板

```markdown
## UI 验证报告

### ✅ 通过项
| 检查项 | 实际值 |

### ❌ 失败项
| 检查项 | 实际值 | 修复建议 |

### 📸 截图路径
...
```

